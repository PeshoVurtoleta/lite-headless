<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>lite-headless · tag-input fixture</title>
<style>
    body {
        font-family: system-ui, sans-serif;
        font-size: 14px;
        margin: 2rem;
        background: #0e0f12;
        color: #d8d6d2;
    }
    h2 {
        font-size: 0.875rem;
        margin-block: 1.5rem 0.5rem;
        color: #8a8a8a;
        font-family: monospace;
    }
    lite-tag-input {
        display: flex;
        flex-wrap: wrap;
        gap: 0.375rem;
        align-items: center;
        padding: 0.5rem;
        background: #16181c;
        border: 1px solid #2a2d33;
        border-radius: 0.375rem;
        min-block-size: 2.5rem;
    }
    [data-tag-list] {
        display: contents;
    }
    [data-tag-chip] {
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
        padding: 0.125rem 0.375rem 0.125rem 0.625rem;
        background: #1d2026;
        border: 1px solid #2a2d33;
        border-radius: 1rem;
        font-family: 'Space Mono', monospace;
        font-size: 0.75rem;
        color: #d8d6d2;
    }
    [data-tag-chip][data-tag-active="true"] {
        background: #2e1a1a;
        border-color: #d97757;
        color: #f0a878;
    }
    [data-tag-remove] {
        background: transparent;
        color: inherit;
        border: 0;
        cursor: pointer;
        font-size: 1rem;
        line-height: 1;
        padding: 0;
        opacity: 0.6;
    }
    [data-tag-remove]:hover { opacity: 1; }
    [data-tag-input-slot] {
        flex: 1 1 8rem;
        min-inline-size: 8rem;
        font: inherit;
        background: transparent;
        color: #d8d6d2;
        border: 0;
        outline: none;
    }
    .readout {
        margin-top: 0.5rem;
        font-family: 'Space Mono', monospace;
        font-size: 11px;
        color: #4dd0e1;
        min-height: 1.5em;
    }
</style>
<script type="importmap">
{ "imports": {
    "@zakkster/lite-signal":  "/node_modules/@zakkster/lite-signal/Signal.js",
    "@zakkster/lite-element": "/node_modules/@zakkster/lite-element/Element.js"
} }
</script>
</head>
<body>

<h2>basic: maxItems=5</h2>
<lite-tag-input id="tags-basic" max-items="5" aria-label="Filter tags">
    <div data-tag-list></div>
    <input data-tag-input-slot placeholder="type + Enter / comma">
</lite-tag-input>
<div class="readout" id="ro-basic">tags: 0</div>

<h2>email recipients: with space delimiter</h2>
<lite-tag-input id="tags-emails" aria-label="Recipients">
    <div data-tag-list></div>
    <input data-tag-input-slot placeholder="recipient">
</lite-tag-input>
<div class="readout" id="ro-emails">recipients: 0</div>

<div class="readout" id="event-log" style="margin-top: 2rem;">events: -</div>

<script type="module">
    import "/src/tag-input/element.js";

    const log = document.getElementById("event-log");
    function pushLog(msg) {
        log.textContent = "events: " + msg + " | " + log.textContent.replace(/^events: /, "");
    }

    // Basic
    const tb = document.getElementById("tags-basic");
    const rb = document.getElementById("ro-basic");
    tb.addEventListener("change", (e) => {
        rb.textContent = "tags (" + e.detail.tags.length + "): " + JSON.stringify(e.detail.tags);
    });
    tb.addEventListener("invalid", (e) => pushLog("invalid: " + e.detail.tag + " (" + e.detail.reason + ")"));

    // Emails
    const te = document.getElementById("tags-emails");
    const re = document.getElementById("ro-emails");
    te.addEventListener("change", (e) => {
        re.textContent = "recipients (" + e.detail.tags.length + "): " + JSON.stringify(e.detail.tags);
    });
    te.addEventListener("invalid", (e) => pushLog("invalid email: " + e.detail.tag + " (" + e.detail.reason + ")"));

    window.__tagsReady = true;
</script>
</body>
</html>
