<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>lite-headless · progress fixture</title>
<style>
    body {
        font-family: system-ui, sans-serif;
        font-size: clamp(0.8125rem, 0.25vw + 0.75rem, 0.9375rem);
        margin: 2rem;
        max-width: 50rem;
        background: #0e0f12;
        color: #d8d6d2;
    }
    h2 {
        font-size: clamp(0.9375rem, 0.3vw + 0.85rem, 1.0625rem);
        margin-block: 1.5rem 0.5rem;
        color: #8a8a8a;
    }
    .progress {
        height: 0.5rem;
        background: #1d2026;
        border-radius: 999px;
        overflow: hidden;
        max-width: 24rem;
    }
    [data-progress-bar] {
        height: 100%;
        background: #4dd0e1;
        transform-origin: left center;
        transform: scaleX(var(--progress, 0));
        transition: transform 200ms;
    }
    [data-progress-root][data-indeterminate] [data-progress-bar] {
        transform: scaleX(0.3);
        animation: sweep 1.5s ease-in-out infinite;
    }
    @keyframes sweep {
        0%   { transform: translateX(-100%) scaleX(0.3); }
        100% { transform: translateX(300%) scaleX(0.3); }
    }
    .ring svg { width: 4rem; height: 4rem; transform: rotate(-90deg); }
    .ring circle { fill: none; stroke-width: 3; }
    .ring .track { stroke: #1d2026; }
    .ring .ind {
        stroke: #4dd0e1;
        stroke-linecap: round;
        stroke-dasharray: 100.53;
        stroke-dashoffset: calc(100.53 * (1 - var(--progress, 0)));
        transition: stroke-dashoffset 200ms;
    }
    .row { display: flex; align-items: center; gap: 1rem; margin-block: 0.5rem; }
    button { font: inherit; padding: 0.25rem 0.75rem; background: #1d2026; color: #d8d6d2; border: 1px solid #2a2d33; border-radius: 0.25rem; cursor: pointer; }
    .log {
        margin-block-start: 1rem;
        padding: 0.5rem;
        background: #16181c;
        border: 1px solid #2a2d33;
        font: 11px monospace;
        white-space: pre-wrap;
    }
</style>
<script type="importmap">
{ "imports": {
    "@zakkster/lite-signal":  "/node_modules/@zakkster/lite-signal/Signal.js",
    "@zakkster/lite-element": "/node_modules/@zakkster/lite-element/Element.js"
} }
</script>
</head>
<body>

<h2>linear · determinate</h2>
<div class="row">
    <lite-progress id="pg-linear" class="progress" value="35" max="100" label="Linear progress">
        <div data-progress-bar></div>
    </lite-progress>
    <button id="b-linear-50">Set 50</button>
    <button id="b-linear-100">Set 100</button>
    <button id="b-linear-0">Reset</button>
</div>

<h2>linear · indeterminate</h2>
<lite-progress id="pg-indet" class="progress" max="100" indeterminate label="Loading">
    <div data-progress-bar></div>
</lite-progress>
<div class="row">
    <button id="b-indet-off">Switch to determinate</button>
    <button id="b-indet-on">Back to indeterminate</button>
</div>

<h2>circular</h2>
<div class="row ring">
    <lite-progress id="pg-circular" value="0" max="100" variant="circular" label="Circular progress">
        <svg viewBox="0 0 36 36">
            <circle class="track" cx="18" cy="18" r="16"/>
            <circle class="ind" data-progress-indicator cx="18" cy="18" r="16"/>
        </svg>
    </lite-progress>
    <button id="b-circ-25">25%</button>
    <button id="b-circ-75">75%</button>
    <button id="b-circ-100">100%</button>
</div>

<h2>custom valueText (wizard-style)</h2>
<lite-progress id="pg-wizard" class="progress" value="2" max="5" value-text="Step 2 of 5" label="Setup wizard">
    <div data-progress-bar></div>
</lite-progress>
<div class="row">
    <button id="b-wiz-prev">Previous step</button>
    <button id="b-wiz-next">Next step</button>
</div>

<div class="log" id="log">no events yet</div>

<script type="module">
    import "/src/progress/element.js";

    const log = document.getElementById("log");
    function setLog(msg) { log.textContent = msg; }

    document.getElementById("pg-linear").addEventListener("change",
        e => setLog(`linear: ${e.detail.value}/${(e.detail.fraction * 100).toFixed(0)}%`));
    document.getElementById("pg-linear").addEventListener("complete",
        () => { window.__linearComplete = (window.__linearComplete || 0) + 1; });

    document.getElementById("pg-circular").addEventListener("change",
        e => setLog(`circular: ${e.detail.value} (frac ${e.detail.fraction.toFixed(2)})`));

    document.getElementById("b-linear-50").addEventListener("click",
        () => document.getElementById("pg-linear").setAttribute("value", "50"));
    document.getElementById("b-linear-100").addEventListener("click",
        () => document.getElementById("pg-linear").setAttribute("value", "100"));
    document.getElementById("b-linear-0").addEventListener("click",
        () => document.getElementById("pg-linear").setAttribute("value", "0"));

    document.getElementById("b-indet-off").addEventListener("click",
        () => document.getElementById("pg-indet").removeAttribute("indeterminate"));
    document.getElementById("b-indet-on").addEventListener("click",
        () => document.getElementById("pg-indet").setAttribute("indeterminate", ""));

    document.getElementById("b-circ-25").addEventListener("click",
        () => document.getElementById("pg-circular").setValue(25));
    document.getElementById("b-circ-75").addEventListener("click",
        () => document.getElementById("pg-circular").setValue(75));
    document.getElementById("b-circ-100").addEventListener("click",
        () => document.getElementById("pg-circular").setValue(100));

    const wiz = document.getElementById("pg-wizard");
    document.getElementById("b-wiz-prev").addEventListener("click", () => {
        const v = Math.max(1, wiz.value - 1);
        wiz.setValue(v);
        wiz.setAttribute("value-text", `Step ${v} of 5`);
    });
    document.getElementById("b-wiz-next").addEventListener("click", () => {
        const v = Math.min(5, wiz.value + 1);
        wiz.setValue(v);
        wiz.setAttribute("value-text", `Step ${v} of 5`);
    });

    window.__progressReady = true;
</script>
</body>
</html>
