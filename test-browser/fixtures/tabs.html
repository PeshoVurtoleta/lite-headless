<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>lite-headless · tabs fixture</title>
<style>
    body { font: 14px system-ui, sans-serif; margin: 40px; }
    [data-tablist] {
        display: flex; gap: 4px; border-bottom: 1px solid #ccc;
        margin-bottom: 8px;
    }
    [data-tablist][aria-orientation="vertical"] {
        flex-direction: column;
        border-bottom: 0; border-right: 1px solid #ccc;
        width: 160px;
    }
    [data-tab] {
        padding: 8px 16px; border: 0; background: none;
        border-bottom: 2px solid transparent;
        cursor: pointer; font: inherit; text-align: left;
    }
    [data-tab][data-active] { border-bottom-color: #4a90e2; color: #4a90e2; }
    [data-tab][disabled] { opacity: 0.4; cursor: not-allowed; }
    [data-panel] { padding: 16px; background: #f5f5f5; border-radius: 4px; margin-top: 4px; }
    section { margin-bottom: 32px; padding: 12px; border: 1px solid #ccc; border-radius: 6px; }
    section h2 { margin: 0 0 8px; font-size: 13px; color: #666; }
</style>
<script type="importmap">
{ "imports": {
    "@zakkster/lite-signal":  "/node_modules/@zakkster/lite-signal/Signal.js",
    "@zakkster/lite-element": "/node_modules/@zakkster/lite-element/Element.js"
} }
</script>
</head>
<body>

<section>
    <h2>1. horizontal · automatic activation</h2>
    <lite-tabs id="auto" value="overview">
        <div data-tablist>
            <button data-tab="overview" type="button">Overview</button>
            <button data-tab="settings" type="button">Settings</button>
            <button data-tab="billing" type="button" data-disabled>Billing</button>
        </div>
        <div data-panel="overview">Overview content</div>
        <div data-panel="settings">Settings content</div>
        <div data-panel="billing">Billing content</div>
    </lite-tabs>
</section>

<section>
    <h2>2. horizontal · manual activation</h2>
    <lite-tabs id="manual" value="a" activation="manual">
        <div data-tablist>
            <button data-tab="a" type="button">A</button>
            <button data-tab="b" type="button">B</button>
            <button data-tab="c" type="button">C</button>
        </div>
        <div data-panel="a">Panel A</div>
        <div data-panel="b">Panel B</div>
        <div data-panel="c">Panel C</div>
    </lite-tabs>
</section>

<section>
    <h2>3. vertical orientation</h2>
    <lite-tabs id="vert" value="one" orientation="vertical">
        <div data-tablist>
            <button data-tab="one" type="button">One</button>
            <button data-tab="two" type="button">Two</button>
            <button data-tab="three" type="button">Three</button>
        </div>
        <div data-panel="one">First</div>
        <div data-panel="two">Second</div>
        <div data-panel="three">Third</div>
    </lite-tabs>
</section>

<script type="module">
    import "../../src/tabs/element.js";
    window.__tabsReady = true;
</script>
</body>
</html>
