<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>lite-headless · inline-edit fixture</title>
<style>
    body {
        font-family: system-ui, sans-serif;
        font-size: 14px;
        margin: 2rem;
        background: #0e0f12;
        color: #d8d6d2;
    }
    h2 {
        font-size: 0.875rem;
        margin-block: 1.5rem 0.5rem;
        color: #8a8a8a;
        font-family: monospace;
    }
    lite-inline-edit {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.375rem 0.625rem;
        background: #16181c;
        border: 1px solid #2a2d33;
        border-radius: 0.375rem;
        min-inline-size: 14rem;
        cursor: text;
    }
    [data-inline-edit-display-slot] {
        font-family: 'Space Mono', monospace;
        color: #d8d6d2;
        outline: none;
    }
    [data-inline-edit-display-slot]:focus {
        outline: 1px dashed #4dd0e1;
        outline-offset: 2px;
    }
    [data-inline-edit-input-slot] {
        font: inherit;
        font-family: 'Space Mono', monospace;
        background: transparent;
        color: #d8d6d2;
        border: 0;
        outline: none;
        padding: 0;
        min-inline-size: 12rem;
    }
    [data-inline-edit-root][data-invalid="true"] {
        border-color: oklch(60% 0.18 30);
    }
    .readout {
        margin-top: 0.5rem;
        font-family: 'Space Mono', monospace;
        font-size: 11px;
        color: #4dd0e1;
        min-height: 1.5em;
    }
</style>
<script type="importmap">
{ "imports": {
    "@zakkster/lite-signal":  "/node_modules/@zakkster/lite-signal/Signal.js",
    "@zakkster/lite-element": "/node_modules/@zakkster/lite-element/Element.js"
} }
</script>
</head>
<body>

<h2>basic · default commitOn=[Enter,blur]</h2>
<lite-inline-edit id="ie-basic" value="Untitled card" aria-label="Card title">
    <span data-inline-edit-display-slot tabindex="0"></span>
    <input data-inline-edit-input-slot type="text">
</lite-inline-edit>
<div class="readout" id="ro-basic">value: "Untitled card" · editing: false</div>

<h2>min-length validation · invalid stays in edit</h2>
<lite-inline-edit id="ie-validated" value="abc" aria-label="Slug">
    <span data-inline-edit-display-slot tabindex="0"></span>
    <input data-inline-edit-input-slot type="text">
</lite-inline-edit>
<div class="readout" id="ro-validated">value: "abc" · invalid: false</div>

<div class="readout" id="event-log" style="margin-top: 2rem;">events: -</div>

<script type="module">
    import "/src/inline-edit/element.js";

    const log = document.getElementById("event-log");
    function pushLog(msg) {
        log.textContent = "events: " + msg + " | " + log.textContent.replace(/^events: /, "");
    }

    // Basic
    const ib = document.getElementById("ie-basic");
    const rb = document.getElementById("ro-basic");
    function paintB() {
        rb.textContent = 'value: "' + ib.value + '" · editing: ' + ib.isEditing;
    }
    ib.addEventListener("commit",    (e) => { pushLog("commit: " + JSON.stringify(e.detail)); paintB(); });
    ib.addEventListener("cancel",    ()  => { pushLog("cancel"); paintB(); });
    ib.addEventListener("editstart", ()  => { pushLog("editstart"); paintB(); });
    paintB();

    // Validated (min length 3)
    const iv = document.getElementById("ie-validated");
    const rv = document.getElementById("ro-validated");
    // Set validate via the primitive instance (the wrapper doesn't forward validate)
    iv._inlineEditInstance && (() => {
        // No-op: the instance's onInvalid + onCommit will fire from
        // events, but the validate function is provided at construction.
        // We'd normally use createInlineEdit() directly for custom
        // validation. As a workaround in the wrapper, we intercept
        // the commit event + roll back via setValue.
    })();
    iv.addEventListener("commit", (e) => {
        if (e.detail.value.length < 3) {
            // Re-enter edit with the prior value
            iv.setValue(e.detail.previous);
            iv.startEdit();
            pushLog("validated: too short, rolled back");
        }
    });
    function paintV() {
        rv.textContent = 'value: "' + iv.value + '" · invalid: ' + iv.isInvalid;
    }
    iv.addEventListener("commit", paintV);
    iv.addEventListener("editstart", paintV);
    iv.addEventListener("cancel", paintV);
    paintV();

    window.__inlineEditReady = true;
</script>
</body>
</html>
